name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate API key secret
        run: |
          if [ -z "${{ secrets.GOOGLE_PLACES_API_KEY }}" ]; then
            echo "GOOGLE_PLACES_API_KEY secret is not set."
            exit 1
          fi

      - name: Prepare site with config.js
        run: |
          mkdir site
          cp index.html app.js styles.css site/
          cat > site/config.js <<EOF
          window.APP_CONFIG = {
            GOOGLE_PLACES_API_KEY: "${{ secrets.GOOGLE_PLACES_API_KEY }}",
          };
          EOF
          test -f site/config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
