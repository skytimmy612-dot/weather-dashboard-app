<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>天氣查詢</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#d6e6f8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="天氣" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=20260715" />
</head>
<body>
  <div class="phone">
    <main class="app" id="app">
      <section class="search-section" aria-label="城市查詢">
        <form class="city-search" id="searchForm">
          <button type="button" class="pin-btn" id="locateBtn" aria-label="查詢目前位置天氣" title="我的位置">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-4.6 7-11a7 7 0 1 0-14 0c0 6.4 7 11 7 11z" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
          <input
            type="search"
            id="cityInput"
            name="city"
            value="台北市"
            placeholder="輸入城市或 7/10-7/15 沖繩"
            autocomplete="off"
            aria-label="城市名稱"
          />
          <button type="button" class="fav-btn" id="favoriteBtn" aria-label="加入收藏" title="收藏此城市">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.3l-6.2 3.3 1.2-6.9L2 8.7l6.9-1L12 1.5l3.1 6.2 6.9 1-5 5 1.2 6.9z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </button>
          <button type="submit" class="search-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            查詢
          </button>
        </form>
        <p class="search-hint" id="searchHint">目前顯示：台北市（按查詢取得即時天氣資訊）</p>
        <div class="favorite-chips" id="favoriteChips" aria-label="收藏城市"></div>
      </section>

      <div class="rain-alert hidden" id="rainAlert" role="status"></div>

      <div class="loading hidden" id="loading">查詢天氣中…</div>
      <div class="error hidden" id="error"></div>

      <section class="card card-weather" aria-labelledby="weatherTitle">
        <div class="weather-fx" id="weatherFx" aria-hidden="true"></div>
        <button type="button" class="share-btn" id="shareBtn" aria-label="分享天氣" title="分享天氣">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="18" cy="5" r="2.5" fill="none" stroke="currentColor" stroke-width="1.7"/><circle cx="6" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="1.7"/><circle cx="18" cy="19" r="2.5" fill="none" stroke="currentColor" stroke-width="1.7"/><line x1="8.1" y1="10.7" x2="15.9" y2="6.3" stroke="currentColor" stroke-width="1.7"/><line x1="8.1" y1="13.3" x2="15.9" y2="17.7" stroke="currentColor" stroke-width="1.7"/></svg>
        </button>
        <div class="weather-main">
          <div>
            <p class="temp" id="currentTemp">--°C</p>
            <p class="weather-desc" id="weatherDesc">載入中…</p>
            <p class="weather-extras" id="weatherExtras"></p>
            <p class="weather-sun" id="weatherSun"></p>
          </div>
          <div class="weather-icon" id="weatherIcon" aria-hidden="true"></div>
        </div>
        <div class="hourly" id="hourlyForecast"></div>
      </section>

      <section class="card card-daily" aria-labelledby="dailyTitle">
        <h2 class="card-title" id="dailyTitle">
          <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.6"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          未來 5 日預報
        </h2>
        <div class="daily" id="dailyForecast"></div>
      </section>

      <section class="card card-outfit" aria-labelledby="outfitTitle">
        <h2 class="card-title" id="outfitTitle">
          <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3l4 3v2h-2v12H6V8H4V6l4-3 4 3 4-3z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          今日穿搭建議
        </h2>
        <div class="outfit-grid" id="outfitGrid"></div>
      </section>

      <section class="card card-food" aria-labelledby="foodTitle">
        <div class="food-header">
          <h2 class="card-title" id="foodTitle">
            <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4M14 3v5c0 2 2 3 2 5v9M18 3v5c0 2-2 3-2 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            附近美食推薦
          </h2>
          <button class="link-btn" type="button" id="viewAllFood">查看全部</button>
        </div>
        <ul class="food-list" id="foodList"></ul>
      </section>

      <section class="card card-travel hidden" id="travelSummary" aria-labelledby="travelTitle">
        <h2 class="card-title" id="travelTitle">行程摘要</h2>
        <div class="travel-days" id="travelDays"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主要導覽">
      <button class="nav-btn active" type="button" data-tab="weather">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 18a5 5 0 1 1 8.7-3.4A4 4 0 1 1 16 18H7z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        天氣
      </button>
      <button class="nav-btn" type="button" data-tab="outfit">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3l4 3v2h-2v12H6V8H4V6l4-3 4 3 4-3z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        穿搭
      </button>
      <button class="nav-btn" type="button" data-tab="food">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v8M10 3v8M6 7h4M14 3v5c0 2 2 3 2 5v9M18 3v5c0 2-2 3-2 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        美食
      </button>
    </nav>

    <div class="home-indicator" aria-hidden="true"></div>
  </div>

  <script>
    window.APP_CONFIG = window.APP_CONFIG || {};
  </script>
  <script src="config.js"></script>
  <script src="app.js?v=20260715" defer></script>
</body>
</html>
